<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-labelledby="title desc">
  <title id="title">L&amp;A logo</title>
  <desc id="desc">Cursive L and A monogram for Lufuno and Aluwani.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8e6bb"/>
      <stop offset="45%" stop-color="#d7b26a"/>
      <stop offset="100%" stop-color="#9e7427"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4a3520" flood-opacity="0.20"/>
    </filter>
  </defs>
  <rect width="520" height="220" fill="transparent"/>
  <g filter="url(#softGlow)">
    <text x="260" y="120" text-anchor="middle"
      font-family="Brush Script MT, Lucida Handwriting, Apple Chancery, Snell Roundhand, cursive"
      font-size="112" fill="url(#gold)">L&amp;A</text>
    <path d="M150 143 C200 171, 320 171, 370 143" fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <text x="260" y="174" text-anchor="middle"
      font-family="Georgia, Times New Roman, serif" font-size="20" letter-spacing="3.2" fill="#e9dbc2">LUFUNO &amp; ALUWANI</text>
  </g>
</svg>